<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 330" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13">
  <!-- Animates in any browser (GitHub renders README images via <img>, where CSS
       animation runs). Where styles or motion are unavailable — reduced-motion
       users, style-stripping renderers — it degrades to the full static frame. -->
  <style>
    @media (prefers-reduced-motion: no-preference) {
      .line { opacity: 0; }
      @keyframes l1 { 0%, 2.8% { opacity: 0 } 2.9%, 96% { opacity: 1 } 100% { opacity: 0 } }
      @keyframes l2 { 0%, 9.9% { opacity: 0 } 10%, 96% { opacity: 1 } 100% { opacity: 0 } }
      @keyframes l3 { 0%, 18.5% { opacity: 0 } 18.6%, 96% { opacity: 1 } 100% { opacity: 0 } }
      @keyframes l4 { 0%, 28.5% { opacity: 0 } 28.6%, 96% { opacity: 1 } 100% { opacity: 0 } }
      @keyframes l5 { 0%, 41.3% { opacity: 0 } 41.4%, 96% { opacity: 1 } 100% { opacity: 0 } }
      @keyframes l6 { 0%, 49.9% { opacity: 0 } 50%, 96% { opacity: 1 } 100% { opacity: 0 } }
      @keyframes l7 { 0%, 61.3% { opacity: 0 } 61.4%, 96% { opacity: 1 } 100% { opacity: 0 } }
      @keyframes l8 { 0%, 69.9% { opacity: 0 } 70%, 96% { opacity: 1 } 100% { opacity: 0 } }
      @keyframes l9 { 0%, 79.9% { opacity: 0 } 80%, 96% { opacity: 1 } 100% { opacity: 0 } }
      .l1 { animation: l1 14s linear infinite }
      .l2 { animation: l2 14s linear infinite }
      .l3 { animation: l3 14s linear infinite }
      .l4 { animation: l4 14s linear infinite }
      .l5 { animation: l5 14s linear infinite }
      .l6 { animation: l6 14s linear infinite }
      .l7 { animation: l7 14s linear infinite }
      .l8 { animation: l8 14s linear infinite }
      .l9 { animation: l9 14s linear infinite }
    }
  </style>

